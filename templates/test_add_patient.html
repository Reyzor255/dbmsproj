<!DOCTYPE html>
<html>
<head>
    <title>Test Add Patient</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 300px; padding: 8px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; background: #f8f9fa; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Add Patient Test</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label>Patient Name:</label>
            <input type="text" id="name" value="Test Patient" required>
        </div>
        
        <div class="form-group">
            <label>Age:</label>
            <input type="number" id="age" value="30" min="1" max="120" required>
        </div>
        
        <div class="form-group">
            <label>Gender:</label>
            <select id="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Phone:</label>
            <input type="tel" id="phone" value="1234567890" required>
        </div>
        
        <div class="form-group">
            <label>Address:</label>
            <textarea id="address">Test Address</textarea>
        </div>
        
        <button type="submit">Add Patient</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Submitting...';
            
            const formData = {
                patient_name: document.getElementById('name').value,
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            
            console.log('Form data:', formData);
            
            try {
                const response = await fetch('/api/patients', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                let result;
                try {
                    result = JSON.parse(responseText);
                } catch (parseError) {
                    console.error('JSON parse error:', parseError);
                    resultDiv.innerHTML = `<strong>Error:</strong> Invalid JSON response: ${responseText}`;
                    return;
                }
                
                if (result.success) {
                    resultDiv.innerHTML = '<strong style="color: green;">SUCCESS!</strong> Patient added successfully.';
                    // Generate new test data
                    document.getElementById('phone').value = Math.floor(Math.random() * 9000000000) + 1000000000;
                    document.getElementById('name').value = 'Test Patient ' + Math.floor(Math.random() * 1000);
                } else {
                    resultDiv.innerHTML = `<strong style="color: red;">ERROR:</strong> ${result.error || 'Unknown error'}`;
                }
                
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `<strong style="color: red;">NETWORK ERROR:</strong> ${error.message}`;
            }
        });
        
        // Test API endpoint availability
        fetch('/api/patients')
            .then(response => {
                console.log('API test - Status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('API test - Current patients:', data);
            })
            .catch(error => {
                console.error('API test failed:', error);
            });
    </script>
</body>
</html>
