<!DOCTYPE html>
<html>
<head>
    <title>Test Token Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 300px; padding: 8px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; background: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Test Token Generation</h1>
    
    <form id="tokenForm">
        <div class="form-group">
            <label for="patient_id">Patient ID:</label>
            <input type="number" id="patient_id" name="patient_id" value="1" required>
        </div>
        
        <div class="form-group">
            <label for="doctor_id">Doctor ID:</label>
            <input type="number" id="doctor_id" name="doctor_id" value="1" required>
        </div>
        
        <div class="form-group">
            <label for="dept_id">Department ID:</label>
            <input type="number" id="dept_id" name="dept_id" value="1" required>
        </div>
        
        <div class="form-group">
            <label for="appointment_time">Appointment Time:</label>
            <input type="datetime-local" id="appointment_time" name="appointment_time" required>
        </div>
        
        <button type="submit">Generate Token</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <script>
        // Set default appointment time to 1 hour from now
        const now = new Date();
        now.setHours(now.getHours() + 1);
        const isoString = now.toISOString().slice(0, 16);
        document.getElementById('appointment_time').value = isoString;
        
        document.getElementById('tokenForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                patient_id: parseInt(document.getElementById('patient_id').value),
                doctor_id: parseInt(document.getElementById('doctor_id').value),
                dept_id: parseInt(document.getElementById('dept_id').value),
                appointment_time: document.getElementById('appointment_time').value
            };
            
            console.log('Sending token data:', formData);
            
            try {
                const response = await fetch('/api/tokens', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                
                if (result.success) {
                    resultDiv.innerHTML = '<strong style="color: green;">Success!</strong> Token generated: ' + result.token_number;
                    document.getElementById('tokenForm').reset();
                    // Reset default time
                    const newTime = new Date();
                    newTime.setHours(newTime.getHours() + 1);
                    document.getElementById('appointment_time').value = newTime.toISOString().slice(0, 16);
                } else {
                    resultDiv.innerHTML = '<strong style="color: red;">Error:</strong> ' + (result.error || 'Unknown error');
                }
                
                console.log('Response:', result);
                
            } catch (error) {
                console.error('Error:', error);
                const resultDiv = document.getElementById('result');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<strong style="color: red;">Error:</strong> ' + error.message;
            }
        });
    </script>
</body>
</html>
