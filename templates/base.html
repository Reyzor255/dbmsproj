<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hospital Queue Management{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>Hospital Queue Management</h1>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('departments') }}">Departments</a></li>
                <li><a href="{{ url_for('doctors') }}">Doctors</a></li>
                <li><a href="{{ url_for('patients') }}">Patients</a></li>
                <li><a href="{{ url_for('tokens') }}">Queue Tokens</a></li>
                <li><a href="{{ url_for('reports') }}">Reports</a></li>
                <li style="margin-left: auto;"><span style="color: #fff;">{{ session.full_name }} ({{ session.role }})</span></li>
                <li><a href="{{ url_for('logout') }}" style="background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 5px;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
